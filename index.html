<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llenado de Formato SENASICA</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .formulario { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        label { font-weight: bold; margin-top: 15px; display: block; font-size: 14px; color: #333; }
        input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; text-transform: uppercase; }
        .fila { display: flex; gap: 10px; }
        .fila div { flex: 1; }
        
        #canvas-firma { border: 2px dashed #3498db; background-color: #f9f9f9; width: 100%; height: 150px; margin-top: 10px; touch-action: none; cursor: crosshair; }
        
        button { width: 100%; padding: 15px; font-size: 16px; margin-top: 15px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
        .btn-gps { background-color: #27ae60; }
        .btn-pdf { background-color: #c0392b; }
        .btn-limpiar { background-color: #7f8c8d; }
    </style>
</head>
<body>

    <div class="formulario">
        <h2>Captura de Datos - SENASICA</h2>
        <p style="text-align:center; font-size: 12px; color: #666;">Llena los datos aquí. Al generar, se estamparán en el PDF oficial.</p>

        <label>Nombre del Propietario:</label>
        <input type="text" id="nombre_propietario" placeholder="Ej. JUAN PEREZ">

        <label>RFC:</label>
        <input type="text" id="rfc" placeholder="Ej. PEMA800101XYZ">

        <div class="fila">
            <div>
                <label>Latitud:</label>
                <input type="text" id="latitud">
            </div>
            <div>
                <label>Longitud:</label>
                <input type="text" id="longitud">
            </div>
        </div>
        <button class="btn-gps" onclick="obtenerGPS()">📍 Obtener Coordenadas Actuales</button>

        <label>Área o Superficie (has):</label>
        <input type="number" step="0.01" id="superficie">

        <label>Lugar y Fecha:</label>
        <input type="text" id="lugar_fecha" placeholder="Ej. LOS MOCHIS, SINALOA A...">

        <label>Firma del Propietario:</label>
        <canvas id="canvas-firma"></canvas>
        <button class="btn-limpiar" onclick="limpiarFirma()">🧹 Borrar Firma</button>

        <button class="btn-pdf" onclick="llenarYDescargarPDF()">📄 Generar Documento Oficial</button>
    </div>

    <script>
        // --- LÓGICA DE FIRMA (Igual que antes, adaptada a pantalla completa) ---
        const canvas = document.getElementById('canvas-firma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        function ajustarCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        window.onload = ajustarCanvas;

        ctx.lineWidth = 2; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';

        function obtenerPos(e) {
            const rect = canvas.getBoundingClientRect();
            let x = e.clientX || (e.touches && e.touches[0].clientX);
            let y = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: x - rect.left, y: y - rect.top };
        }

        canvas.addEventListener('mousedown', (e) => { dibujando = true; ctx.beginPath(); ctx.moveTo(obtenerPos(e).x, obtenerPos(e).y); });
        canvas.addEventListener('mousemove', (e) => { if(dibujando) { ctx.lineTo(obtenerPos(e).x, obtenerPos(e).y); ctx.stroke(); } });
        canvas.addEventListener('mouseup', () => dibujando = false);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); dibujando = true; ctx.beginPath(); ctx.moveTo(obtenerPos(e).x, obtenerPos(e).y); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(dibujando) { ctx.lineTo(obtenerPos(e).x, obtenerPos(e).y); ctx.stroke(); } }, {passive: false});
        canvas.addEventListener('touchend', () => dibujando = false);

        function limpiarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // --- LÓGICA DE GPS ---
        function obtenerGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    document.getElementById('latitud').value = pos.coords.latitude.toFixed(6);
                    document.getElementById('longitud').value = pos.coords.longitude.toFixed(6);
                    alert("¡Coordenadas obtenidas!");
                });
            } else { alert("GPS no soportado."); }
        }

        // --- MAGIA: LECTURA DEL PDF Y ESTAMPADO DE DATOS ---
        async function llenarYDescargarPDF() {
            try {
                // 1. Cargamos el PDF vacío original que tienes en la carpeta
                // Asegúrate de nombrar tu PDF oficial como "formato_vacio.pdf"
                const urlPDF = 'formato_vacio.pdf'; 
                const existingPdfBytes = await fetch(urlPDF).then(res => res.arrayBuffer());

                const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
                
                // Obtenemos la primera página del documento
                const pages = pdfDoc.getPages();
                const primeraPagina = pages[0];

                // 2. Extraemos los valores del formulario
                const txtNombre = document.getElementById('nombre_propietario').value.toUpperCase();
                const txtRFC = document.getElementById('rfc').value.toUpperCase();
                const txtLat = document.getElementById('latitud').value;
                const txtLon = document.getElementById('longitud').value;
                const txtSup = document.getElementById('superficie').value;
                const txtFecha = document.getElementById('lugar_fecha').value.toUpperCase();

                // 3. Estampamos los textos en el PDF
                // NOTA: El punto (x:0, y:0) en un PDF es la ESQUINA INFERIOR IZQUIERDA.
                // Tendrás que jugar un poco con estos números para que caigan exacto en las rayas.
                const tamañoTexto = 10;
                
                primeraPagina.drawText(txtNombre, { x: 150, y: 650, size: tamañoTexto }); // Ajusta X y Y
                primeraPagina.drawText(txtRFC, { x: 450, y: 670, size: tamañoTexto });
                primeraPagina.drawText(txtLat, { x: 200, y: 400, size: tamañoTexto });
                primeraPagina.drawText(txtLon, { x: 300, y: 400, size: tamañoTexto });
                primeraPagina.drawText(txtSup, { x: 150, y: 300, size: tamañoTexto });
                primeraPagina.drawText(txtFecha, { x: 200, y: 150, size: tamañoTexto });

                // 4. Estampamos la FIRMA
                const firmaDataUrl = canvas.toDataURL('image/png');
                const firmaImageBytes = await fetch(firmaDataUrl).then(res => res.arrayBuffer());
                const firmaImage = await pdfDoc.embedPng(firmaImageBytes);
                
                // Dibujamos la firma (Ajusta la posición x, y según el espacio del PDF)
                primeraPagina.drawImage(firmaImage, {
                    x: 250, 
                    y: 180, 
                    width: 150, 
                    height: 50
                });

                // 5. Generamos el nuevo PDF y lo descargamos
                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                link.download = `AVISO_${txtNombre.replace(/ /g, '_')}.pdf`;
                link.click();

            } catch (error) {
                console.error(error);
                alert("Hubo un error al generar el PDF. Asegúrate de tener el archivo 'formato_vacio.pdf' en la misma carpeta que este HTML.");
            }
        }
    </script>
</body>
</html>
