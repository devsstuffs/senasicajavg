<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llenado Oficial SENASICA</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #e0e6ed; padding: 15px; margin: 0; }
        .contenedor { max-width: 600px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #621132; margin-top: 0; }
        .instrucciones { text-align: center; font-size: 12px; color: #666; margin-bottom: 20px; }
        
        .seccion { border: 1px solid #ccc; padding: 15px; border-radius: 5px; margin-bottom: 15px; background-color: #fafafa; }
        .seccion-titulo { font-weight: bold; font-size: 14px; margin-bottom: 10px; color: #333; border-bottom: 1px solid #ccc; padding-bottom: 5px; }
        
        label { font-weight: bold; margin-top: 10px; display: block; font-size: 12px; color: #333; }
        input[type="text"], input[type="number"], input[type="email"] { width: 100%; padding: 8px; margin-top: 4px; border: 1px solid #aaa; border-radius: 4px; box-sizing: border-box; text-transform: uppercase; font-size: 13px; background: #fff;}
        input[type="email"] { text-transform: lowercase; }
        
        .fila { display: flex; gap: 10px; }
        .fila > div { flex: 1; }
        
        .checkbox-group { display: flex; gap: 15px; margin-top: 5px; align-items: center; font-size: 13px; }
        .checkbox-group input { transform: scale(1.3); margin-right: 5px; }

        #canvas-firma { border: 2px dashed #621132; background-color: #fff; width: 100%; height: 120px; margin-top: 10px; touch-action: none; cursor: crosshair; }
        
        /* Contenedor del mapa en vivo */
        .mapa-en-vivo { width: 100%; height: 300px; border: 1px solid #ccc; border-radius: 5px; background: #eee; margin-top: 15px; text-align: center; display: none; overflow: hidden;}
        .mapa-en-vivo iframe { width: 100%; height: 100%; border: 0; }

        button { width: 100%; padding: 12px; font-size: 15px; margin-top: 10px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
        .btn-gps { background-color: #2e7d32; }
        .btn-limpiar { background-color: #7f8c8d; }
        .btn-pdf { background-color: #c62828; margin-top: 20px; font-size: 16px; padding: 15px; }
    </style>
</head>
<body>

    <div class="contenedor">
        <h2>Formato SENASICA</h2>
        <p class="instrucciones">Llena los datos a continuación. Al presionar "Generar Documento", se estamparán perfectamente sobre el PDF original.</p>

        <div class="seccion">
            <div class="seccion-titulo">DATOS DE CABECERA</div>
            <label>Nombre de la Unidad de Producción Comercial:</label>
            <input type="text" id="unidad_produccion" placeholder="EJ. GONZALEZ VILLEGAS YASMIN">
            
            <label>Número de Registro (Uso Exclusivo):</label>
            <input type="text" id="num_registro">
            <div class="checkbox-group">
                <label><input type="checkbox" id="chk_verificacion"> Verificación</label>
                <label><input type="checkbox" id="chk_certificacion"> Certificación</label>
            </div>
        </div>

        <div class="seccion">
            <div class="seccion-titulo">I. DATOS GENERALES</div>
            <div class="checkbox-group">
                <label><input type="checkbox" id="chk_fisica" checked> Persona Física</label>
                <label><input type="checkbox" id="chk_moral"> Persona Moral</label>
            </div>
            
            <div class="fila">
                <div><label>RFC:</label><input type="text" id="rfc" maxlength="13"></div>
                <div><label>Teléfono:</label><input type="text" id="tel_gral"></div>
            </div>
            
            <label>Nombre del Propietario o Rep. Legal:</label>
            <input type="text" id="nombre_propietario">
            
            <div class="fila">
                <div style="flex: 2;"><label>Calle:</label><input type="text" id="calle_gral"></div>
                <div style="flex: 1;"><label>Número:</label><input type="text" id="num_gral"></div>
            </div>
            <label>Localidad o Colonia:</label><input type="text" id="colonia_gral">
            
            <div class="fila">
                <div><label>Municipio:</label><input type="text" id="mun_gral"></div>
                <div><label>Estado:</label><input type="text" id="estado_gral"></div>
                <div><label>C.P.:</label><input type="number" id="cp_gral"></div>
            </div>
            <label>Correo Electrónico:</label><input type="email" id="correo_gral">
        </div>

        <div class="seccion">
            <div class="seccion-titulo">II. DATOS DEL ESTABLECIMIENTO</div>
            <div class="fila">
                <div style="flex: 2;"><label>Nombre o Razón Social:</label><input type="text" id="razon_social"></div>
                <div style="flex: 1;"><label>Teléfono:</label><input type="text" id="tel_est"></div>
            </div>
            
            <div class="fila">
                <div style="flex: 2;"><label>Calle:</label><input type="text" id="calle_est"></div>
                <div style="flex: 1;"><label>Número:</label><input type="text" id="num_est"></div>
            </div>
            <label>Localidad o Colonia:</label><input type="text" id="colonia_est">
            
            <div class="fila">
                <div><label>Municipio:</label><input type="text" id="mun_est"></div>
                <div><label>Estado:</label><input type="text" id="estado_est"></div>
                <div><label>C.P.:</label><input type="number" id="cp_est"></div>
            </div>
            <label>Correo Electrónico:</label><input type="email" id="correo_est">

            <label style="margin-top: 15px; color: #2e7d32;">Ubicación Satelital (Georreferenciación):</label>
            <div class="fila">
                <div><input type="text" id="latitud" placeholder="Latitud (Ej. 25.9106)"></div>
                <div><input type="text" id="longitud" placeholder="Longitud (Ej. -109.3424)"></div>
            </div>
            <button class="btn-gps" onclick="obtenerGPS()">📍 Obtener Coordenadas Actuales</button>

            <div id="vista-mapa" class="mapa-en-vivo">
                </div>

            <div class="checkbox-group" style="margin-top:15px;">
                <label><input type="checkbox" id="chk_nacional"> Destino Nacional</label>
                <label><input type="checkbox" id="chk_exportacion" checked> Destino Exportación</label>
            </div>

            <label>Origen del Producto Vegetal:</label><input type="text" id="origen">
            
            <div class="fila">
                <div><label>Área o Superficie (has):</label><input type="number" step="0.01" id="superficie"></div>
                <div><label>Volumen Aprox (TON):</label><input type="number" step="0.01" id="volumen"></div>
            </div>
        </div>

        <div class="seccion">
            <div class="seccion-titulo">III. FIRMA Y FECHA</div>
            <label>Lugar y Fecha:</label>
            <input type="text" id="lugar_fecha" placeholder="EJ. LOS MOCHIS, AHOME, SINALOA A...">
            
            <label style="text-align: center; margin-top: 15px;">Firma del Propietario:</label>
            <canvas id="canvas-firma"></canvas>
            <button class="btn-limpiar" onclick="limpiarFirma()">🧹 Borrar Firma</button>
        </div>

        <button class="btn-pdf" onclick="llenarYDescargarPDF()">📄 Generar Documento Oficial</button>
    </div>

    <script>
        // --- LÓGICA DE FIRMA ---
        const canvas = document.getElementById('canvas-firma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        function ajustarCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
        window.addEventListener('load', ajustarCanvas);

        ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.strokeStyle = '#000';

        function obtenerPos(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let x = e.clientX || (e.touches && e.touches[0].clientX);
            let y = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: (x - rect.left) * scaleX, y: (y - rect.top) * scaleY };
        }

        canvas.addEventListener('mousedown', (e) => { dibujando = true; ctx.beginPath(); ctx.moveTo(obtenerPos(e).x, obtenerPos(e).y); });
        canvas.addEventListener('mousemove', (e) => { if(dibujando) { ctx.lineTo(obtenerPos(e).x, obtenerPos(e).y); ctx.stroke(); } });
        canvas.addEventListener('mouseup', () => dibujando = false);
        canvas.addEventListener('mouseout', () => dibujando = false);
        
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); dibujando = true; ctx.beginPath(); ctx.moveTo(obtenerPos(e).x, obtenerPos(e).y); }, {passive: false});
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if(dibujando) { ctx.lineTo(obtenerPos(e).x, obtenerPos(e).y); ctx.stroke(); } }, {passive: false});
        canvas.addEventListener('touchend', () => dibujando = false);

        function limpiarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // --- LÓGICA DE MAPA EN VIVO ---
        function actualizarMapa() {
            const lat = document.getElementById('latitud').value.trim();
            const lon = document.getElementById('longitud').value.trim();
            const vistaMapa = document.getElementById('vista-mapa');
            
            if (lat !== "" && lon !== "") {
                const urlMapa = `https://maps.google.com/maps?q=${lat},${lon}&hl=es&z=17&t=k&output=embed`;
                vistaMapa.style.display = 'block';
                vistaMapa.innerHTML = `<iframe src="${urlMapa}"></iframe>`;
            } else {
                vistaMapa.style.display = 'none';
            }
        }

        document.getElementById('latitud').addEventListener('change', actualizarMapa);
        document.getElementById('longitud').addEventListener('change', actualizarMapa);

        function obtenerGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    document.getElementById('latitud').value = pos.coords.latitude.toFixed(6);
                    document.getElementById('longitud').value = pos.coords.longitude.toFixed(6);
                    
                    actualizarMapa();
                    alert("¡Coordenadas obtenidas y mapa cargado!");
                }, () => { alert("Error al obtener GPS. Asegúrate de tenerlo activado y darle permisos al navegador."); });
            } else { alert("GPS no soportado en este dispositivo."); }
        }

        // --- ESTAMPAR TEXTOS EN EL PDF ---
        async function llenarYDescargarPDF() {
            try {
                const urlPDF = 'formato_vacio.pdf'; 
                const existingPdfBytes = await fetch(urlPDF).then(res => res.arrayBuffer());

                const pdfDoc = await PDFLib.PDFDocument.load(existingPdfBytes);
                const pages = pdfDoc.getPages();
                const pagina = pages[0];

                const font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
                const fontBold = await pdfDoc.embedFont(PDFLib.StandardFonts.HelveticaBold);
                const size = 9;

                const estampar = (idHTML, x, y, esCheck = false) => {
                    const el = document.getElementById(idHTML);
                    if (!el) return;
                    let valor = esCheck ? (el.checked ? "X" : "") : el.value.toUpperCase();
                    if (valor) {
                        pagina.drawText(valor, { x: x, y: y, size: esCheck ? 12 : size, font: esCheck ? fontBold : font, color: PDFLib.rgb(0, 0, 0) });
                    }
                };

                // USO EXCLUSIVO Y TÍTULO
                estampar('num_registro', 380, 646);
                estampar('chk_verificacion', 372, 635, true);
                estampar('chk_certificacion', 534, 635, true);
                estampar('unidad_produccion', 116, 551);

                // I. DATOS GENERALES
                estampar('chk_fisica', 161, 513, true);
                estampar('chk_moral', 270, 514, true);
                estampar('rfc', 321, 513);
                
                estampar('nombre_propietario', 311, 503);
                
                estampar('calle_gral', 169, 493);
                estampar('num_gral', 306, 494);
                estampar('colonia_gral', 475, 494);
                
                estampar('mun_gral', 121, 483);
                estampar('estado_gral', 231, 484);
                estampar('cp_gral', 317, 485);
                estampar('tel_gral', 455, 483);
                
                // Correo electrónico en minúsculas
                const correoGral = document.getElementById('correo_gral').value.toLowerCase();
                pagina.drawText(correoGral, { x: 170, y: 473, size: size, font: font });

                // II. DATOS DEL ESTABLECIMIENTO
                estampar('razon_social', 199, 428);
                estampar('tel_est', 284, 393);
                
                estampar('calle_est', 100, 402);
                estampar('num_est', 221, 402);
                estampar('colonia_est', 379, 402);
                
                estampar('mun_est', 489, 403);
                estampar('estado_est', 99, 393);
                estampar('cp_est', 177, 394);
                
                const correoEst = document.getElementById('correo_est').value.toLowerCase();
                pagina.drawText(correoEst, { x: 165, y: 473, size: size, font: font });

                // GEORREFERENCIACIÓN
                const coordsStr = document.getElementById('latitud').value + ", " + document.getElementById('longitud').value;
                if (coordsStr !== ", ") {
                    pagina.drawText(coordsStr, { x: 261, y: 365, size: size, font: font });
                }
                
                estampar('chk_nacional', 300, 343, true);
                estampar('chk_exportacion', 391, 343, true);

                estampar('origen', 227, 275);
                estampar('superficie', 223, 261);
                estampar('volumen', 263, 247);

                // III. FECHA Y LUGAR
                estampar('lugar_fecha', 138, 144);

                // NOMBRE ABAJO DE LA FIRMA (Se copia automático del general)
                const nombreFirma = document.getElementById('nombre_propietario').value.toUpperCase();
                pagina.drawText(nombreFirma, { x: 130, y: 215, size: size, font: font });

                const firmaDataUrl = canvas.toDataURL('image/png');
                const firmaImageBytes = await fetch(firmaDataUrl).then(res => res.arrayBuffer());
                const firmaImage = await pdfDoc.embedPng(firmaImageBytes);
                
                // Ajusta la posición de la firma (X, Y) y su tamaño
                pagina.drawImage(firmaImage, {
                    x: 216, 
                    y: 199, 
                    width: 140, 
                    height: 40
                });

                // --- PÁGINA 2: COORDENADAS ---
                const lat = document.getElementById('latitud').value;
                const lon = document.getElementById('longitud').value;
                
                if (lat && lon) {
                    const page2 = pdfDoc.addPage([612, 792]); // Tamaño carta
                    page2.drawText("ANEXO: UBICACIÓN SATELITAL Y COORDENADAS", { x: 120, y: 720, size: 14, font: fontBold });
                    page2.drawText(`Latitud: ${lat}`, { x: 50, y: 680, size: 12, font: font });
                    page2.drawText(`Longitud: ${lon}`, { x: 50, y: 660, size: 12, font: font });
                    page2.drawText(`Puede consultar la ubicación satelital escaneando o ingresando al siguiente enlace:`, { x: 50, y: 630, size: 10, font: font });
                    
                    const urlGoogleMaps = `https://maps.google.com/maps?q=${lat},${lon}`;
                    page2.drawText(urlGoogleMaps, { x: 50, y: 610, size: 10, font: font, color: PDFLib.rgb(0, 0, 1) });

                    // =========================================================================
                    // ESTO ES LO ÚNICO NUEVO: INSERTA EL MAPA EN EL PDF SIN TOCAR GOOGLE MAPS
                    // =========================================================================
                    try {
                        const latNum = parseFloat(lat);
                        const lonNum = parseFloat(lon);
                        const offset = 0.0025; // Define el nivel de zoom del mapa en el PDF
                        const bbox = `${lonNum - offset},${latNum - offset},${lonNum + offset},${latNum + offset}`;
                        
                        // Obtenemos una imagen estática de satélite de un servidor libre (Esri/ArcGIS)
                        const urlSatelite = `https://services.arcgisonline.com/arcgis/rest/services/World_Imagery/MapServer/export?bbox=${bbox}&bboxSR=4326&imageSR=4326&size=450,400&format=png&f=image`;
                        
                        const imgMapaBytes = await fetch(urlSatelite).then(res => res.arrayBuffer());
                        const imagenMapa = await pdfDoc.embedPng(imgMapaBytes);

                        const imgAncho = 450;
                        const imgAlto = 400;
                        const imgX = (page2.getWidth() / 2) - (imgAncho / 2);
                        const imgY = 170; // Altura en la hoja del PDF

                        // Pegar la foto en la segunda hoja
                        page2.drawImage(imagenMapa, { x: imgX, y: imgY, width: imgAncho, height: imgAlto });

                        // Dibujar manualmente el pin (Punto rojo) exactamente en el centro de la imagen
                        page2.drawCircle({
                            x: imgX + (imgAncho / 2),
                            y: imgY + (imgAlto / 2),
                            size: 6,
                            color: PDFLib.rgb(0.9, 0.1, 0.1),
                            borderColor: PDFLib.rgb(1, 1, 1),
                            borderWidth: 2,
                        });
                    } catch (e) {
                        console.log("Aviso: No se pudo descargar la imagen satelital para el PDF.", e);
                    }
                    // =========================================================================
                }

                const pdfBytes = await pdfDoc.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const link = document.createElement('a');
                link.href = URL.createObjectURL(blob);
                
                const nombreDescarga = nombreFirma ? `SENASICA_${nombreFirma.replace(/ /g, '_')}.pdf` : `Aviso_SENASICA.pdf`;
                link.download = nombreDescarga;
                link.click();

            } catch (error) {
                console.error(error);
                alert("Hubo un error al generar el PDF. Verifica que el archivo 'formato_vacio.pdf' esté en la misma carpeta e inténtalo de nuevo.");
            }
        }
    </script>
</body>
</html>
