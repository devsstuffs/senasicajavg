<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=850">
    <title>Aviso SENASICA Oficial</title>
    <style>
        body {
            background-color: #525659;
            margin: 0;
            padding: 20px;
            font-family: Arial, sans-serif;
        }

        /* Contenedor del documento. Dimensiones proporcionales a una hoja real */
        #documento-papel {
            background-color: white;
            width: 800px;
            height: 1131px; /* Proporción A4/Carta */
            margin: 0 auto;
            position: relative;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            overflow: hidden;
        }

        /* La imagen original se usa como fondo exacto */
        #fondo-oficial {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Configuración de las "cajas invisibles" para escribir */
        input[type="text"], input[type="number"], input[type="email"] {
            position: absolute;
            z-index: 10;
            background-color: rgba(255, 255, 0, 0.25); /* Tono amarillo para guiar en celular */
            border: none;
            outline: none;
            font-family: Arial, sans-serif;
            font-size: 13px;
            font-weight: bold;
            color: #000;
            padding: 0 5px;
            text-transform: uppercase;
        }

        input[type="checkbox"] {
            position: absolute;
            z-index: 10;
            transform: scale(1.5);
            cursor: pointer;
        }

        /* --- POSICIONES EXACTAS DE LOS CAMPOS (Basadas en tu imagen) --- */
        /* Uso Exclusivo */
        #uso_registro { top: 14.8%; left: 52%; width: 44%; }
        #chk_verificacion { top: 16.5%; left: 47%; }
        #chk_certificacion { top: 16.5%; left: 63%; }

        /* Párrafo legal */
        #parrafo_establecimiento { top: 27.2%; left: 9.5%; width: 23%; height: 1.5%; text-align: center; }

        /* I. Datos Generales */
        #chk_fisica { top: 33%; left: 19%; }
        #chk_moral { top: 33%; left: 36%; }
        #gral_rfc { top: 32.5%; left: 49%; width: 20%; }
        #gral_nombre { top: 34.2%; left: 34.5%; width: 45%; }
        #gral_calle { top: 35.8%; left: 15%; width: 20%; }
        #gral_num { top: 35.8%; left: 42%; width: 10%; }
        #gral_col { top: 35.8%; left: 71%; width: 24%; }
        #gral_mun { top: 37.5%; left: 10%; width: 12%; }
        #gral_est { top: 37.5%; left: 30%; width: 13%; }
        #gral_cp { top: 37.5%; left: 48%; width: 8%; }
        #gral_tel { top: 37.5%; left: 68%; width: 15%; }
        #gral_correo { top: 39.2%; left: 18%; width: 35%; text-transform: lowercase; }

        /* II. Datos del Establecimiento */
        #est_razon { top: 44.8%; left: 23%; width: 25%; }
        #est_calle { top: 48.2%; left: 7.5%; width: 17%; }
        #est_num { top: 48.2%; left: 31%; width: 9%; }
        #est_col { top: 48.2%; left: 56%; width: 18%; }
        #est_mun { top: 48.2%; left: 83%; width: 14%; }
        #est_est { top: 50%; left: 8%; width: 11%; }
        #est_cp { top: 50%; left: 24%; width: 9%; }
        #est_tel { top: 50%; left: 42%; width: 13%; }
        #est_correo { top: 51.5%; left: 19%; width: 30%; text-transform: lowercase; }

        /* Georreferenciación */
        #geo_lat { top: 53.5%; left: 38%; width: 13%; text-align: center;}
        #geo_lon { top: 53.5%; left: 55%; width: 13%; text-align: center;}
        #chk_nacional { top: 56.5%; left: 43.5%; }
        #chk_exportacion { top: 56.5%; left: 61%; } /* Ya tiene la X, pero ponemos el checkbox encima por si acaso */

        #origen_prod { top: 65.5%; left: 26%; width: 40%; }
        #area_sup { top: 67.5%; left: 24%; width: 12%; }
        #volumen_prod { top: 69.5%; left: 32%; width: 12%; }

        /* III. Firma */
        #canvas-firma {
            position: absolute;
            z-index: 10;
            top: 71%;
            left: 28%;
            width: 44%;
            height: 6%;
            border: 1px dashed #c0392b;
            background-color: rgba(255, 255, 0, 0.1);
            touch-action: none;
            cursor: crosshair;
        }
        #nombre_firma { top: 76.5%; left: 28%; width: 44%; text-align: center; font-size: 14px; background: transparent;}
        #lugar_fecha { top: 82.5%; left: 16%; width: 35%; }

        /* Botones Flotantes */
        .controles { text-align: center; margin-bottom: 20px; background: #fff; padding: 15px; border-radius: 8px; max-width: 800px; margin: 0 auto 20px auto; }
        button { padding: 12px 15px; font-size: 14px; margin: 5px; cursor: pointer; border: none; border-radius: 5px; color: white; font-weight: bold; }
        .btn-gps { background-color: #27ae60; }
        .btn-manual { background-color: #d35400; }
        .btn-limpiar { background-color: #34495e; }
        .btn-pdf { background-color: #c0392b; }

        /* Segunda página */
        .pagina-mapa { width: 800px; margin: 20px auto 0 auto; background: white; padding: 20px; box-sizing: border-box; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #mapa-iframe { width: 100%; height: 600px; border: 2px solid #000; background: #eee; margin-top: 10px;}

        /* --- CONFIGURACIÓN DE IMPRESIÓN OFICIAL --- */
        @media print {
            body { background-color: #fff; padding: 0; margin: 0; -webkit-print-color-adjust: exact; color-adjust: exact; }
            .controles { display: none !important; }
            #documento-papel { box-shadow: none; margin: 0; border: none; }
            .pagina-mapa { box-shadow: none; margin: 0; padding: 0; page-break-before: always; }
            /* Quitar el fondo amarillo de los campos al generar PDF */
            input[type="text"], input[type="number"], input[type="email"] { background-color: transparent !important; }
            #canvas-firma { background-color: transparent !important; border: none !important; }
        }
    </style>
</head>
<body>

    <div class="controles">
        <button class="btn-gps" onclick="obtenerGPS()">📍 Obtener GPS Actual</button>
        <button class="btn-manual" onclick="ingresarCoordenadasManuales()">🗺️ Ingresar Coordenadas a Mano</button>
        <button class="btn-limpiar" onclick="limpiarFirma()">🧹 Borrar Firma</button>
        <button class="btn-pdf" onclick="window.print()">📄 Guardar PDF Oficial</button>
    </div>

    <div id="documento-papel">
        <img src="image_5c6bdc.png" id="fondo-oficial" alt="Formato SENASICA">

        <input type="text" id="uso_registro">
        <input type="checkbox" id="chk_verificacion">
        <input type="checkbox" id="chk_certificacion">

        <input type="text" id="parrafo_establecimiento">

        <input type="checkbox" id="chk_fisica">
        <input type="checkbox" id="chk_moral">
        <input type="text" id="gral_rfc" maxlength="13">
        <input type="text" id="gral_nombre">
        <input type="text" id="gral_calle">
        <input type="text" id="gral_num">
        <input type="text" id="gral_col">
        <input type="text" id="gral_mun">
        <input type="text" id="gral_est">
        <input type="text" id="gral_cp">
        <input type="text" id="gral_tel">
        <input type="email" id="gral_correo">

        <input type="text" id="est_razon">
        <input type="text" id="est_calle">
        <input type="text" id="est_num">
        <input type="text" id="est_col">
        <input type="text" id="est_mun">
        <input type="text" id="est_est">
        <input type="text" id="est_cp">
        <input type="text" id="est_tel">
        <input type="email" id="est_correo">

        <input type="text" id="geo_lat" placeholder="Latitud">
        <input type="text" id="geo_lon" placeholder="Longitud">
        
        <input type="checkbox" id="chk_nacional">
        <input type="checkbox" id="chk_exportacion" checked>

        <input type="text" id="origen_prod">
        <input type="number" step="0.01" id="area_sup">
        <input type="number" step="0.01" id="volumen_prod">

        <canvas id="canvas-firma" width="350" height="70"></canvas>
        <input type="text" id="nombre_firma">
        <input type="text" id="lugar_fecha">
    </div>

    <div class="pagina-mapa">
        <h2 style="text-align: center; font-family: Arial;">ANEXO: UBICACIÓN SATELITAL</h2>
        <div id="mapa-iframe">
            <p style="text-align: center; color: #666; margin-top: 280px; font-family: Arial;">
                <em>El mapa satelital aparecerá aquí al obtener las coordenadas.</em>
            </p>
        </div>
    </div>

    <script>
        // Sincronizar nombre (Datos Generales -> Firma)
        const inputGralNombre = document.getElementById('gral_nombre');
        const inputNombreFirma = document.getElementById('nombre_firma');
        inputGralNombre.addEventListener('input', () => { inputNombreFirma.value = inputGralNombre.value; });
        inputNombreFirma.addEventListener('input', () => { inputGralNombre.value = inputNombreFirma.value; });

        // Lógica de dibujo para la firma en el canvas
        const canvas = document.getElementById('canvas-firma');
        const ctx = canvas.getContext('2d');
        let dibujando = false;

        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.strokeStyle = '#000000'; // Tinta negra

        function obtenerPosicion(e) {
            const rect = canvas.getBoundingClientRect();
            // Escala ajustada por si el usuario hace zoom en el celular
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let x = e.clientX || (e.touches && e.touches[0].clientX);
            let y = e.clientY || (e.touches && e.touches[0].clientY);
            return { x: (x - rect.left) * scaleX, y: (y - rect.top) * scaleY };
        }

        function iniciarDibujo(e) { e.preventDefault(); dibujando = true; const pos = obtenerPosicion(e); ctx.beginPath(); ctx.moveTo(pos.x, pos.y); }
        function dibujar(e) { if (!dibujando) return; e.preventDefault(); const pos = obtenerPosicion(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
        function detenerDibujo() { dibujando = false; }

        canvas.addEventListener('mousedown', iniciarDibujo);
        canvas.addEventListener('mousemove', dibujar);
        canvas.addEventListener('mouseup', detenerDibujo);
        canvas.addEventListener('mouseout', detenerDibujo);
        canvas.addEventListener('touchstart', iniciarDibujo, {passive: false});
        canvas.addEventListener('touchmove', dibujar, {passive: false});
        canvas.addEventListener('touchend', detenerDibujo);

        function limpiarFirma() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

        // --- Lógica de Coordenadas y Mapa ---
        function obtenerGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(pos => {
                    const lat = pos.coords.latitude.toFixed(6);
                    const lon = pos.coords.longitude.toFixed(6);
                    
                    document.getElementById('geo_lat').value = lat;
                    document.getElementById('geo_lon').value = lon;
                    cargarMapaSatelital(lat, lon);
                    alert("¡Ubicación cargada con éxito!");
                }, () => { alert("Error: Verifica que el GPS esté encendido y Chrome/Safari tenga permiso de ubicación."); });
            } else { alert("Tu dispositivo no soporta geolocalización."); }
        }

        function ingresarCoordenadasManuales() {
            // Pedimos las coordenadas mediante una ventana emergente para que sea más fácil de pegar
            let coords = prompt("Pega las coordenadas aquí (Latitud, Longitud):\nEjemplo: 25.910650, -109.342458");
            if (coords && coords.includes(',')) {
                let partes = coords.split(',');
                let lat = partes[0].trim();
                let lon = partes[1].trim();
                
                document.getElementById('geo_lat').value = lat;
                document.getElementById('geo_lon').value = lon;
                cargarMapaSatelital(lat, lon);
                alert("Mapa actualizado correctamente.");
            } else if (coords) {
                alert("Formato incorrecto. Asegúrate de separar la latitud y longitud con una coma.");
            }
        }

        function cargarMapaSatelital(lat, lon) {
            const urlMapa = `https://maps.google.com/maps?q=$${lat},${lon}&t=k&z=17&output=embed`;
            document.getElementById('mapa-iframe').innerHTML = `<iframe src="${urlMapa}" frameborder="0" style="width:100%; height:100%;"></iframe>`;
        }
    </script>
</body>
</html>
